name: Generate Profile Animations

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    environment: production  # ← ADD THIS
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # 1. Snake
      - name: Generate Snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark

      # 2. Pac-Man
      - name: Generate Pac-Man
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      # 3. Cinnamoroll Progress Bar
      - name: Generate Cinnamoroll Progress
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics.plugin.activity.svg
          base: ""
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_filter: issue,pr

      # 4. Cute Anime Metrics
      - name: Metrics Embed
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: metrics.svg
          base: header, activity, community
          config_octicon: yes
          config_timezone: Asia/Manila
          plugin_anilist: yes
          plugin_anilist_limit: 2
          plugin_anilist_medias: anime
          plugin_anilist_sections: watching
